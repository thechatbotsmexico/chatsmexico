<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Chatbots México</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #020818;
      color: #fff;
      overflow-x: hidden;
    }

    /* Geometric pattern overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(30,80,200,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,80,200,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow effects */
    .glow-top {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(29,78,216,0.25) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(2,8,24,0.6);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(30,80,200,0.15);
    }

    .nav-logo {
      font-size: 1em;
      font-weight: 600;
      color: #93c5fd;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      gap: 35px;
      list-style: none;
    }

    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9em;
      font-weight: 400;
      transition: color 0.3s;
    }

    .nav-links a:hover { color: #fff; }

    .nav-cta {
      background: rgba(30,80,200,0.2);
      border: 1px solid rgba(93,169,253,0.3);
      color: #93c5fd;
      padding: 9px 22px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9em;
      font-weight: 500;
      transition: all 0.3s;
    }

    .nav-cta:hover {
      background: rgba(30,80,200,0.35);
      border-color: rgba(93,169,253,0.6);
    }

    /* Hero */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 20px 80px;
    }

    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(30,80,200,0.15);
      border: 1px solid rgba(93,169,253,0.25);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.8em;
      color: #93c5fd;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 35px;
    }

    .hero-label::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #3b82f6;
      border-radius: 50%;
      box-shadow: 0 0 8px #3b82f6;
    }

    .hero h1 {
      font-size: clamp(2.8em, 6vw, 5em);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -2px;
      color: #fff;
      max-width: 750px;
      margin-bottom: 25px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, #60a5fa, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.1em;
      color: #64748b;
      max-width: 480px;
      line-height: 1.8;
      margin-bottom: 45px;
      font-weight: 400;
    }

    .hero-buttons {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1d4ed8, #4f46e5, #7c3aed);
      color: #fff;
      padding: 14px 35px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95em;
      box-shadow: 0 0 30px rgba(79,70,229,0.4), 0 0 60px rgba(79,70,229,0.15);
      transition: all 0.3s;
      border: 1px solid rgba(167,139,250,0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 0 40px rgba(79,70,229,0.6), 0 0 80px rgba(79,70,229,0.25);
      transform: translateY(-2px);
    }

    .btn-secondary {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.95em;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.3s;
    }

    .btn-secondary:hover { color: #fff; }

    /* Stats bar */
    .stats-bar {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 60px;
      padding: 40px 20px;
      border-top: 1px solid rgba(30,80,200,0.15);
      border-bottom: 1px solid rgba(30,80,200,0.15);
      background: rgba(2,8,24,0.5);
      flex-wrap: wrap;
    }

    .stat { text-align: center; }
    .stat-number {
      font-size: 2em;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
    }
    .stat-label {
      font-size: 0.8em;
      color: #475569;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Features */
    .features {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 100px 20px;
    }
