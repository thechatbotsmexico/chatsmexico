<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Solutions MX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #020818;
      color: #fff;
      overflow-x: hidden;
    }

    /* GRADIENTES DE FONDO */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(0,114,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(18,124,255,0.08) 0%, transparent 60%),
        linear-gradient(180deg, #020818 0%, #041030 50%, #020818 100%);
      pointer-events: none;
      z-index: -1;
    }

    .glow-top {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 700px;
      background: radial-gradient(ellipse, rgba(0,114,255,0.25) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* SCROLL ANIMATIONS — bidireccionales */
    .reveal {
      opacity: 0;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.from-bottom { transform: translateY(50px); }
    .reveal.from-left { transform: translateX(-50px); }
    .reveal.from-right { transform: translateX(50px); }
    .reveal.from-top { transform: translateY(-40px); }
    .reveal.scale-in { transform: scale(0.92); }
    .reveal.visible { opacity: 1; transform: none; }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(2,8,24,0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(18,124,255,0.15);
    }

    .nav-logo {
      font-size: 0.95em;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .nav-btn-primary {
      padding: 10px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 0.85em;
      font-weight: 600;
      transition: all 0.3s;
      background: linear-gradient(135deg, #0072ff, #127cff);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 16px rgba(0,114,255,0.4);
      white-space: nowrap;
    }

    .nav-btn-primary:hover {
      box-shadow: 0 0 28px rgba(0,114,255,0.6);
      transform: translateY(-1px);
    }

    /* HERO */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('images/BACK.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      opacity: 0.1;
      z-index: 0;
    }

    .hero-glow {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(0,114,255,0.2) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .hero-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      align-items: center;
      max-width: 1000px;
      width: 100%;
    }

    .hero-left {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-neo {
      width: 85%;
      max-width: 340px;
      filter: drop-shadow(0 0 40px rgba(0,114,255,0.6));
      animation: float 8s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-16px); }
    }

    .hero-right {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(18,124,255,0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(18,124,255,0.25);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.72em;
      color: #93c5fd;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 24px;
    }

    .hero-label::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #127cff;
      border-radius: 50%;
      box-shadow: 0 0 8px #127cff;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .hero-right h1 {
      font-size: clamp(2.2em, 5vw, 4em);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 40%, #60a5fa 70%, #127cff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-right p {
      font-size: 1em;
      color: #64748b;
      line-height: 1.8;
      margin-bottom: 36px;
      max-width: 420px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0072ff, #127cff);
      color: #fff;
      padding: 15px 36px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95em;
      box-shadow: 0 0 30px rgba(0,114,255,0.5);
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.15);
      display: inline-block;
    }

    .btn-primary:hover {
      box-shadow: 0 0 45px rgba(0,114,255,0.7);
      transform: translateY(-2px);
    }

    /* SEPARADOR CON GRADIENTE */
    .gradient-divider {
      position: relative;
      z-index: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(18,124,255,0.4), rgba(96,165,250,0.6), rgba(18,124,255,0.4), transparent);
      margin: 0;
    }

    /* STATS */
    .stats-bar {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 36px 24px;
      background: rgba(2,8,24,0.5);
      backdrop-filter: blur(10px);
      flex-wrap: wrap;
    }

    .stat { text-align: center; }

    .stat-number {
      font-size: 1.8em;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .stat-label {
      font-size: 0.72em;
      color: #475569;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* SECCIONES */
    section {
      position: relative;
      z-index: 1;
    }

    .section-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .section-label {
      text-align: center;
      font-size: 0.72em;
      color: #127cff;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .section-title {
      text-align: center;
      font-size: clamp(1.8em, 4vw, 2.5em);
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 12px;
      letter-spacing: -1px;
      line-height: 1.2;
    }

    .section-sub {
      text-align: center;
      color: #475569;
      font-size: 0.95em;
      margin-bottom: 50px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    /* PROBLEMA */
    .problem-section {
      background: linear-gradient(180deg, transparent, rgba(0,20,60,0.3), transparent);
    }

    .problem-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .problem-card {
      background: rgba(18,124,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(18,124,255,0.15);
      border-radius: 16px;
      padding: 30px 24px;
      text-align: center;
      transition: all 0.3s;
    }

    .problem-card:hover {
      border-color: rgba(18,124,255,0.4);
      background: rgba(18,124,255,0.1);
      transform: translateY(-3px);
    }

    .problem-number {
      font-size: 2.8em;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #127cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
      margin-bottom: 8px;
    }

    .problem-text {
      font-size: 0.88em;
      color: #94a3b8;
      line-height: 1.5;
    }

    /* FEATURES */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1px;
      background: linear-gradient(135deg, rgba(18,124,255,0.1), rgba(96,165,250,0.05));
      border: 1px solid rgba(18,124,255,0.12);
      border-radius: 20px;
      overflow: hidden;
    }

    .feature-item {
      background: rgba(2,8,24,0.95);
      padding: 36px 30px;
      transition: background 0.3s;
    }

    .feature-item:hover { background: rgba(0,25,70,0.98); }

    .feature-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, rgba(0,114,255,0.2), rgba(18,124,255,0.1));
      border: 1px solid rgba(18,124,255,0.25);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1em;
      margin-bottom: 18px;
    }

    .feature-item h3 {
      font-size: 1em;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 8px;
    }

    .feature-item p {
      font-size: 0.85em;
      color: #475569;
      line-height: 1.7;
    }

    /* CHAT MOCKUP */
    .chat-section {
      background: linear-gradient(180deg, transparent, rgba(0,30,80,0.15), transparent);
    }

    .chat-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      align-items: center;
    }

    .chat-text h2 {
      font-size: clamp(1.6em, 3.5vw, 2.2em);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .chat-text p {
      color: #475569;
      line-height: 1.8;
      font-size: 0.92em;
      margin-bottom: 28px;
    }

    .chat-mockup {
      background: rgba(5,15,40,0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(18,124,255,0.2);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,114,255,0.12), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .chat-header {
      background: linear-gradient(135deg, rgba(0,114,255,0.2), rgba(18,124,255,0.1));
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(18,124,255,0.2);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0072ff, #127cff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85em;
      color: #fff;
      box-shadow: 0 0 10px rgba(0,114,255,0.5);
    }

    .chat-info { flex: 1; }

    .chat-name {
      font-size: 0.85em;
      font-weight: 600;
      color: #e2e8f0;
    }

    .chat-status {
      font-size: 0.7em;
      color: #22c55e;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .chat-status::before {
      content: '';
      width: 5px;
      height: 5px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 5px #22c55e;
    }

    .chat-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }

    .chat-body-bg {
      position: absolute;
      inset: 0;
      background-image: url('images/BACK.png');
      background-size: cover;
      opacity: 0.06;
    }

    .msg { position: relative; z-index: 1; max-width: 82%; }

    .msg-bot {
      align-self: flex-start;
      background: rgba(18,124,255,0.18);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(18,124,255,0.25);
      border-radius: 0 12px 12px 12px;
      padding: 10px 14px;
      font-size: 0.82em;
      color: #e2e8f0;
      line-height: 1.6;
    }

    .msg-user {
      align-self: flex-end;
      background: linear-gradient(135deg, #0072ff, #127cff);
      border-radius: 12px 12px 0 12px;
      padding: 10px 14px;
      font-size: 0.82em;
      color: #fff;
      line-height: 1.6;
    }

    .msg-time {
      font-size: 0.68em;
      color: #334155;
      margin-top: 3px;
      text-align: right;
    }

    /* NEO INTRO */
    .neo-section {
      background: linear-gradient(180deg, transparent, rgba(0,40,100,0.1), transparent);
    }

    .neo-intro {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .neo-image {
      display: flex;
      justify-content: center;
      position: relative;
    }

    .neo-img {
      width: 200px;
      filter: drop-shadow(0 0 30px rgba(0,114,255,0.5));
      animation: float 8s ease-in-out infinite;
    }

    .neo-logo-img {
      width: 160px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 15px rgba(0,114,255,0.4));
    }

    .neo-text h2 {
      font-size: clamp(1.6em, 3.5vw, 2.2em);
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .neo-text p {
      color: #475569;
      line-height: 1.8;
      font-size: 0.92em;
      margin-bottom: 16px;
    }

    .neo-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(18,124,255,0.1);
      border: 1px solid rgba(18,124,255,0.2);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.75em;
      color: #93c5fd;
      margin-bottom: 8px;
    }

    /* GOOGLE SHEETS */
    .sheets-section {
      background: linear-gradient(180deg, transparent, rgba(0,20,60,0.2), transparent);
    }

    .sheets-mockup {
      background: rgba(5,15,40,0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(18,124,255,0.2);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0,114,255,0.1);
    }

    .sheets-header {
      background: linear-gradient(135deg, rgba(0,114,255,0.15), rgba(18,124,255,0.08));
      border-bottom: 1px solid rgba(18,124,255,0.2);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sheets-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .sheets-title {
      font-size: 0.82em;
      color: #94a3b8;
      margin-left: 8px;
    }

    .sheets-table {
      width: 100%;
      border-collapse: collapse;
    }

    .sheets-table th {
      background: rgba(18,124,255,0.1);
      color: #60a5fa;
      font-size: 0.72em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(18,124,255,0.15);
    }

    .sheets-table td {
      padding: 10px 16px;
      font-size: 0.8em;
      color: #94a3b8;
      border-bottom: 1px solid rgba(18,124,255,0.08);
    }

    .sheets-table tr {
      transition: all 0.3s;
      opacity: 0;
      transform: translateX(-10px);
    }

    .sheets-table tr.row-visible {
      opacity: 1;
      transform: translateX(0);
    }

    .sheets-table tr:hover td { color: #e2e8f0; background: rgba(18,124,255,0.05); }

    .canal-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75em;
      font-weight: 500;
    }

    .canal-fb { background: rgba(24,119,242,0.2); color: #60a5fa; border: 1px solid rgba(24,119,242,0.3); }
    .canal-wa { background: rgba(37,211,102,0.15); color: #4ade80; border: 1px solid rgba(37,211,102,0.3); }
    .canal-ig { background: rgba(225,48,108,0.15); color: #f472b6; border: 1px solid rgba(225,48,108,0.3); }

    /* PLANS */
    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      align-items: start;
    }

    .plan-card {
      backdrop-filter: blur(16px);
      border: 1px solid rgba(18,124,255,0.15);
      border-radius: 20px;
      padding: 30px;
      position: relative;
      transition: all 0.3s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: rgba(2,8,30,0.6);
    }

    .plan-card-bg {
      position: absolute;
      inset: 0;
      background-image: url('images/BACK.png');
      background-size: cover;
      opacity: 0.06;
      z-index: 0;
    }

    .plan-card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(2,8,30,0.82);
      z-index: 0;
    }

    .plan-card > *:not(.plan-card-bg):not(.plan-card-overlay) {
      position: relative;
      z-index: 2;
    }

    .plan-card:hover {
      border-color: rgba(18,124,255,0.5);
      transform: translateY(-4px);
      box-shadow: 0 0 50px rgba(0,114,255,0.2);
    }

    .plan-card:hover .plan-card-overlay {
      background: rgba(0,40,120,0.5);
    }

    .plan-name {
      font-size: 0.75em;
      font-weight: 600;
      color: #60a5fa;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .plan-price {
      font-size: 2.8em;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .plan-price span {
      font-size: 0.3em;
      font-weight: 500;
      letter-spacing: 0;
    }

    .plan-desc {
      font-size: 0.83em;
      color: #fff;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .plan-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(18,124,255,0.3), transparent);
      margin-bottom: 22px;
    }

    .plan-features {
      list-style: none;
      margin-bottom: 28px;
      flex: 1;
    }

    .plan-features li {
      font-size: 0.85em;
      color: #94a3b8;
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .plan-features li::before {
      content: '✓';
      color: #127cff;
      font-weight: 700;
      font-size: 0.9em;
    }

    .plan-btn {
      display: block;
      text-align: center;
      padding: 12px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88em;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      margin-top: auto;
    }

    .plan-btn-outline {
      border: 1px solid rgba(18,124,255,0.35);
      color: #93c5fd;
      background: rgba(18,124,255,0.08);
    }

    .plan-btn-outline:hover {
      border-color: rgba(18,124,255,0.7);
      background: rgba(18,124,255,0.18);
      color: #fff;
    }

    .plan-btn-filled {
      background: linear-gradient(135deg, #0072ff, #127cff);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 18px rgba(0,114,255,0.4);
    }

    .plan-btn-filled:hover {
      box-shadow: 0 0 30px rgba(0,114,255,0.6);
      transform: translateY(-1px);
    }

    /* CTA FINAL */
    .cta-section {
      background: linear-gradient(180deg, transparent, rgba(0,40,100,0.15), transparent);
      text-align: center;
    }

    .cta-section h2 {
      font-size: clamp(2em, 5vw, 3.5em);
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 20px;
